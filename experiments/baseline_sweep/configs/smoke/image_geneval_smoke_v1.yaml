run: image_geneval_smoke_v1
output_root: outputs/baseline_sweep
seed: 420000

enhancers:
  none: null
  Qwen/Qwen2.5-VL-3B-Instruct:
    backend: hf_vlm
    template: prompt/templates/image/geneval/promptrl_style_v1.txt
    params:
      temperature: 0.7
      top_p: 0.9
      max_new_tokens: 256

generators:
  stabilityai/stable-diffusion-3.5-medium:
    backend: fastvideo_image
    params:
      width: 1024
      height: 1024
      steps: 20
      guidance: 6.0

tasks:
  geneval:
    prompt_source: geneval
    source_path: evaluations/geneval/prompts/evaluation_metadata.jsonl
    subset:
      mode: balanced_by_tag
      per_tag: 1
      tags:
        - single_object
        - two_object
        - counting
        - colors
        - position
        - color_attr
    samples_per_prompt: 1
    eval:
      - geneval
    eval_params:
      geneval:
        server_url: http://127.0.0.1:18085
        batch_size: 32
        timeout: 900
        pad_multiple: 0

sweep:
  enhancer:
    - none
    - Qwen/Qwen2.5-VL-3B-Instruct
  generator: stabilityai/stable-diffusion-3.5-medium
  task: geneval
