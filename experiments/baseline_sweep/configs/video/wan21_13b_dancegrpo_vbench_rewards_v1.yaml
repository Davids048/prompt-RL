run: wan21_13b_dancegrpo_vbench_rewards_v1
output_root: outputs/baseline_sweep
seed: 430000

enhancers:
  Qwen/Qwen2.5-VL-3B-Instruct:
    backend: hf_vlm
    template: prompt/templates/video/temporal_motion_v1.txt
    params:
      temperature: 0.7
      top_p: 0.9
      max_new_tokens: 256

  Qwen/Qwen3-VL-8B-Instruct:
    backend: hf_vlm
    template: prompt/templates/video/temporal_motion_v1.txt
    params:
      temperature: 0.7
      top_p: 0.9
      max_new_tokens: 256

  Qwen/Qwen3-VL-32B-Instruct:
    backend: hf_vlm
    template: prompt/templates/video/temporal_motion_v1.txt
    params:
      temperature: 0.7
      top_p: 0.9
      max_new_tokens: 256

  Qwen/Qwen3-VL-32B-Thinking:
    backend: hf_vlm
    template: prompt/templates/video/temporal_motion_v1.txt
    params:
      temperature: 0.7
      top_p: 0.9
      max_new_tokens: 256

generators:
  Wan-AI/Wan2.1-T2V-1.3B-Diffusers:
    backend: fastvideo
    params:
      workload_type: t2v
      height: 480
      width: 480
      num_frames: 53
      fps: 8
      steps: 16
      guidance_scale: 6.0
      negative_prompt: >-
        Bright tones, overexposed, static, blurred details, subtitles, style,
        works, paintings, images, static, overall gray, worst quality, low
        quality, JPEG compression residue, ugly, incomplete, extra fingers,
        poorly drawn hands, poorly drawn faces, deformed, disfigured, misshapen
        limbs, fused fingers, still picture, messy background, three legs, many
        people in the background, walking backwards

tasks:
  dancegrpo_vidprom_top100:
    prompt_source: txt
    source_path: evaluations/DanceGRPO/assets/video_prompts.txt
    subset:
      mode: first_n
      n: 100
    samples_per_prompt: 1
    eval:
      - hpsv3
      - videoalign
    eval_params:
      hpsv3:
        repo: evaluations/HPSv3
        frame_sampling: uniform
        num_frames: 8
        batch_size: 32
        aggregate: mean
      videoalign:
        repo: evaluations/DanceGRPO
        checkpoint_dir: evaluations/DanceGRPO/videoalign_ckpt
        metrics:
          - visual_quality
          - motion_quality
          - text_alignment
        primary_metric: visual_quality

  vbench_official_dimensions:
    prompt_source: vbench
    source_path: FastVideo/fastvideo/third_party/eval/vbench/prompts
    subset:
      mode: official_dimensions
      dimensions:
        - subject_consistency
        - background_consistency
        - temporal_flickering
        - motion_smoothness
        - dynamic_degree
        - aesthetic_quality
        - imaging_quality
        - object_class
        - multiple_objects
        - human_action
        - color
        - spatial_relationship
        - scene
        - appearance_style
        - temporal_style
        - overall_consistency
    samples_per_prompt: 5
    eval:
      - vbench
    eval_params:
      vbench:
        repo: FastVideo/fastvideo/third_party/eval/vbench
        prompt_root: FastVideo/fastvideo/third_party/eval/vbench/prompts
        full_info_path: FastVideo/fastvideo/third_party/eval/vbench/vbench/VBench_full_info.json
        local: true

sweep:
  enhancer:
    - Qwen/Qwen2.5-VL-3B-Instruct
    - Qwen/Qwen3-VL-8B-Instruct
    - Qwen/Qwen3-VL-32B-Instruct
    - Qwen/Qwen3-VL-32B-Thinking
  generator: Wan-AI/Wan2.1-T2V-1.3B-Diffusers
  task:
    - dancegrpo_vidprom_top100
    - vbench_official_dimensions
